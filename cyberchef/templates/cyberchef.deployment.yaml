apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-{{ .Chart.Name }}-deployment
  labels:
    app: {{ .Release.Name }}-{{ .Chart.Name }}-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: {{ .Release.Name }}-{{ .Chart.Name }}-deployment
  template:
    metadata:
      name: {{ .Release.Name }}-{{ .Chart.Name }}-deployment
      labels:
        app: {{ .Release.Name }}-{{ .Chart.Name }}-deployment
    spec:
      automountServiceAccountToken: false
      containers:
        - name: {{ .Release.Name }}-{{ .Chart.Name }}-deployment
          image: "ghcr.io/gchq/cyberchef:{{ .Chart.AppVersion }}"
          imagePullPolicy: IfNotPresent
          # TODO: liveness and readiness probes
          ports:
            - containerPort: 80
              protocol: TCP
              name: http
          resources:
            requests:
              memory: "{{ .Values.cyberchef.resources.requests.memory }}"
              cpu: "{{ .Values.cyberchef.resources.requests.cpu }}"
              ephemeral-storage: "{{ .Values.cyberchef.resources.requests.ephemeralStorage }}"
            limits:
              memory: "{{ .Values.cyberchef.resources.limits.memory }}"
              cpu: "{{ .Values.cyberchef.resources.limits.cpu }}"
              ephemeral-storage: "{{ .Values.cyberchef.resources.limits.ephemeralStorage }}"
      restartPolicy: Always
